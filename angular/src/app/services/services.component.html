<div class="container">
    <div class="header">
        <h2>Our Services</h2>
        <p>Professional car detailing services to make your vehicle shine.</p>
    </div>
    <div class="services-container">
        <div class="service-card" *ngFor="let service of services">
            <img id="{{ service.link }}" [src]="service.image" [alt]="service.title + ' image'">
            <p class="title">{{ service.title }}</p>
            <p>{{ service.description }}</p>
        </div>
    </div>
</div>
